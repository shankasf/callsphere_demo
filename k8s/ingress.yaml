# Public entrypoint for CallSphere Demo at https://demo.callsphere.tech
# - Voice paths (Twilio webhook + media-stream WS + browser voice) -> ai-service:8081
# - Everything else (dashboard UI, /api dashboard+calls, socket.io /events) -> backend:3003
# Traefik upgrades websockets natively (media-stream + socket.io). TLS via cert-manager
# (letsencrypt-prod, HTTP-01 — cert-manager injects its own web-entrypoint solver route,
# so we deliberately do NOT add an http->https redirect that could shadow the ACME path).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress
  namespace: demo
  labels:
    app: demo
  annotations:
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - demo.callsphere.site
      secretName: demo-tls
  rules:
    - host: demo.callsphere.site
      http:
        paths:
          - path: /twilio
            pathType: Prefix
            backend: { service: { name: demo-ai, port: { number: 8081 } } }
          - path: /media-stream
            pathType: Prefix
            backend: { service: { name: demo-ai, port: { number: 8081 } } }
          - path: /twiml-app
            pathType: Prefix
            backend: { service: { name: demo-ai, port: { number: 8081 } } }
          - path: /voice-token
            pathType: Prefix
            backend: { service: { name: demo-ai, port: { number: 8081 } } }
          - path: /webrtc
            pathType: Prefix
            backend: { service: { name: demo-ai, port: { number: 8081 } } }
          - path: /ws
            pathType: Prefix
            backend: { service: { name: demo-ai, port: { number: 8081 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: demo-backend, port: { number: 3003 } } }
